<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0d18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>SecondMind — Live fully. We’ll remember.</title>
<style>
  :root{
    --bg:#0a0d18; --card:#131829; --card2:#1a2036; --border:#28304b;
    --text:#e9ebf4; --muted:#98a0bb; --accent:#e2c188; --accent2:#ccd5eb;
    --danger:#f87171; --ok:#34d399;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  body{min-height:100vh;}
  button{font-family:inherit}
  .hidden{display:none !important}

  /* Auth */
  #authView{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .authCard{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);
    border-radius:18px;padding:28px 24px}
  .logo{font-size:30px;font-weight:800;letter-spacing:-1px;text-align:center;
    background:linear-gradient(100deg,#ecca8d,#f2e3c0 45%,#cdd5ea);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 4px}
  .field{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:12px;
    color:var(--text);font-size:16px;padding:13px 14px;margin-bottom:12px;outline:none}
  .field:focus{border-color:var(--accent)}
  .btn{display:block;width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;
    font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#141a2e}
  .btn:disabled{opacity:.55}
  .btnGhost{background:none;border:none;color:var(--muted);width:100%;padding:12px;font-size:14px;cursor:pointer}
  .authMsg{font-size:14px;color:var(--muted);text-align:center;min-height:20px;margin:10px 0 0}
  .authMsg.err{color:var(--danger)} .authMsg.ok{color:var(--ok)}

  /* App shell */
  #appView{padding-bottom:calc(76px + env(safe-area-inset-bottom))}
  header.top{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px 10px;position:sticky;top:0;background:rgba(10,13,24,.92);
    backdrop-filter:blur(10px);z-index:5}
  header.top .logo{font-size:22px;text-align:left;margin:0}
  .hdrBtns{display:flex;gap:8px}
  .iconBtn{background:none;border:1px solid var(--border);color:var(--muted);
    border-radius:10px;padding:6px 12px;font-size:13px;cursor:pointer}
  .iconBtn.on{color:var(--accent);border-color:var(--accent)}
  main{padding:6px 16px 24px;max-width:640px;margin:0 auto}

  /* Bottom nav */
  nav.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;
    background:rgba(12,16,29,.97);border-top:1px solid var(--border);
    padding-bottom:env(safe-area-inset-bottom);z-index:10}
  nav.tabs button{flex:1;background:none;border:none;color:var(--muted);
    padding:10px 0 8px;font-size:11px;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:2px}
  nav.tabs button .ico{font-size:22px;line-height:1}
  nav.tabs button.active{color:var(--accent)}

  h2.sect{font-size:18px;margin:14px 2px 12px}
  .subHead{font-size:13px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
    color:var(--muted);margin:20px 2px 10px}

  /* Capture */
  .quickRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .quickBtn{background:var(--card);border:1px solid var(--border);border-radius:12px;
    color:var(--text);padding:12px 10px;font-size:13.5px;cursor:pointer;text-align:left}
  .quickBtn .q{font-size:16px;margin-right:6px}
  #memText{width:100%;min-height:100px;background:var(--card);border:1px solid var(--border);
    border-radius:14px;color:var(--text);font-size:17px;padding:14px;resize:vertical;outline:none}
  #memText:focus{border-color:var(--accent)}
  .capRow{display:flex;gap:10px;margin-top:12px}
  .capBtn{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;
    color:var(--text);padding:12px 6px;font-size:14px;cursor:pointer;display:flex;
    flex-direction:column;align-items:center;gap:4px}
  .capBtn .ico{font-size:22px}
  .capBtn.recording{border-color:var(--danger);color:var(--danger);animation:pulse 1.2s infinite}
  @keyframes pulse{50%{opacity:.55}}
  #photoPreview{margin-top:12px;position:relative}
  #photoPreview img{width:100%;border-radius:14px;max-height:280px;object-fit:cover}
  #removePhoto{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);border:none;
    color:#fff;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chip{background:var(--card);border:1px solid var(--border);border-radius:999px;
    padding:7px 13px;font-size:13px;color:var(--muted);cursor:pointer}
  .chip.on{border-color:var(--accent);color:var(--text);background:rgba(226,193,136,.13)}
  #whenWrap{margin-top:12px}
  #whenInput{color-scheme:dark}
  #saveBtn{margin-top:16px}

  /* Search */
  .searchRow{display:flex;gap:8px}
  #searchInput{flex:1;margin-bottom:0}
  #micBtn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:12px;
    font-size:18px;cursor:pointer;padding:0 14px}
  #micBtn.recording{border-color:var(--danger);animation:pulse 1.2s infinite}
  .hint{color:var(--muted);font-size:13px;margin:10px 2px}
  .dateNote{color:var(--accent);font-size:13px;margin:8px 2px}
  .recentRow{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}

  /* Cards */
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;
    padding:14px 16px;margin-bottom:12px}
  .card.pinnedCard{border-color:rgba(226,193,136,.5)}
  .card .content{font-size:16px;line-height:1.45;white-space:pre-wrap;word-break:break-word}
  .card .ocr{font-size:13px;color:var(--muted);margin-top:8px;white-space:pre-wrap;
    max-height:62px;overflow:hidden;border-left:2px solid var(--border);padding-left:8px}
  .card img.mem{width:100%;border-radius:12px;margin-top:10px;max-height:300px;object-fit:cover}
  .meta{display:flex;flex-wrap:wrap;gap:6px 12px;margin-top:10px;color:var(--muted);font-size:13px;align-items:center}
  .catTag{background:rgba(226,193,136,.15);color:#e8cf9f;border-radius:8px;padding:2px 8px;font-size:12px}
  .cardActions{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
  .cardActions button{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:4px 0}
  .cardActions button:hover{color:var(--text)}
  .cardActions .actPin.pinned{color:var(--accent)}
  .dayHead{color:var(--muted);font-size:13px;font-weight:600;text-transform:uppercase;
    letter-spacing:.5px;margin:20px 2px 10px}
  .empty{color:var(--muted);text-align:center;padding:36px 20px;font-size:15px;line-height:1.6}

  /* Timeline extras */
  .viewToggle{display:flex;gap:8px;margin-bottom:10px}
  .filterRow{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filterRow::-webkit-scrollbar{display:none}
  .filterRow .chip{flex:0 0 auto}
  #mapWrap{height:430px;border-radius:16px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px;background:var(--card)}

  /* Reminders */
  .rem{display:flex;align-items:flex-start;gap:12px}
  .rem input[type=checkbox]{width:22px;height:22px;margin-top:2px;accent-color:var(--accent)}
  .rem .rTitle{font-size:15px}
  .rem .rDue{font-size:13px;color:var(--muted);margin-top:2px}
  .rem.overdue .rDue{color:var(--danger)}
  .rem.done .rTitle{text-decoration:line-through;color:var(--muted)}
  .rem .rDel{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px}

  /* Modal */
  #modalBack{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:20;
    display:flex;align-items:flex-end;justify-content:center}
  #modal{background:var(--card);border-top:1px solid var(--border);width:100%;max-width:640px;
    border-radius:20px 20px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom))}
  #modal h3{margin:0 0 14px;font-size:17px}

  /* Toast + offline */
  #toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(90px + env(safe-area-inset-bottom));
    background:#222941;color:var(--text);padding:11px 18px;border-radius:12px;font-size:14px;
    z-index:30;box-shadow:0 6px 24px rgba(0,0,0,.4);transition:opacity .3s;opacity:0;pointer-events:none;
    max-width:88vw;text-align:center}
  #toast.show{opacity:1}
  #offlineBadge{position:fixed;top:calc(env(safe-area-inset-top) + 10px);left:50%;transform:translateX(-50%);
    background:#4a2330;color:#ffb4b4;font-size:12px;padding:5px 14px;border-radius:999px;z-index:40}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(127,132,156,.35);
    border-top-color:currentColor;border-radius:50%;animation:spin .8s linear infinite;vertical-align:-3px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="authView">
  <div class="authCard">
    <img src="logo.jpg" alt="SecondMind — Live fully. We’ll remember." style="width:100%;border-radius:14px;margin-bottom:20px;display:block"/>
    <input class="field" id="email" type="email" placeholder="Email" autocomplete="email">
    <input class="field" id="password" type="password" placeholder="Password" autocomplete="current-password">
    <button class="btn" id="authBtn">Sign in</button>
    <button class="btnGhost" id="authToggle">New here? Create an account</button>
    <p class="authMsg" id="authMsg"></p>
  </div>
</div>

<div id="appView" class="hidden">
  <header class="top">
    <h1 class="logo" style="display:flex;align-items:center;gap:9px"><img src="mark.png" alt="" style="height:28px;border-radius:7px"/>SecondMind</h1>
    <div class="hdrBtns">
      <button class="iconBtn" id="exportBtn" title="Export my data">⬇</button>
      <button class="iconBtn" id="signOutBtn">Sign out</button>
    </div>
  </header>
  <main>

    <!-- CAPTURE -->
    <section id="tab-capture">
      <h2 class="sect">Remember something</h2>
      <div class="quickRow">
        <button class="quickBtn" data-quick="park"><span class="q">🅿️</span>Parked here <span style="color:var(--muted);font-size:11.5px">1-tap save</span></button>
        <button class="quickBtn" data-quick="left"><span class="q">🔑</span>I left ___ at ___</button>
        <button class="quickBtn" data-quick="meds"><span class="q">💊</span>Took medication</button>
        <button class="quickBtn" data-quick="idea"><span class="q">💭</span>Idea…</button>
      </div>
      <textarea id="memText" placeholder="e.g. Parked in lot C, row 14 &#10;Sarah recommended Nari in Japantown &#10;Wifi password is on the photo"></textarea>
      <div class="capRow">
        <button class="capBtn" id="voiceBtn"><span class="ico">🎤</span><span id="voiceLbl">Speak</span></button>
        <button class="capBtn" id="photoBtn"><span class="ico">📷</span><span>Photo <span style="color:var(--muted);font-size:11px">text auto-read</span></span></button>
      </div>
      <input type="file" id="photoInput" accept="image/*" class="hidden">
      <div id="photoPreview" class="hidden"><img id="previewImg" alt="preview"><button id="removePhoto">✕</button></div>
      <div class="chips" id="catChips"></div>
      <div class="chips">
        <button class="chip on" id="locChip">📍 locating…</button>
        <button class="chip" id="whenChip">🕒 now</button>
      </div>
      <div id="whenWrap" class="hidden">
        <input class="field" id="whenInput" type="datetime-local">
      </div>
      <button class="btn" id="saveBtn">Save memory</button>

      <div id="otdWrap" class="hidden">
        <div class="subHead">🕰 On this day</div>
        <div id="otdList"></div>
      </div>
    </section>

    <!-- ASK -->
    <section id="tab-ask" class="hidden">
      <h2 class="sect">Ask your memory</h2>
      <div class="searchRow">
        <input class="field" id="searchInput" type="search" placeholder="Where did I park last month?">
        <button id="micBtn" title="Voice search">🎤</button>
        <button class="btn" id="searchBtn" style="width:auto;padding:0 18px">🔎</button>
      </div>
      <div class="recentRow" id="askChips"></div>
      <p class="dateNote hidden" id="dateNote"></p>
      <div id="searchResults"></div>
    </section>

    <!-- TIMELINE -->
    <section id="tab-timeline" class="hidden">
      <h2 class="sect">Timeline</h2>
      <div class="viewToggle">
        <button class="iconBtn on" id="listViewBtn">☰ List</button>
        <button class="iconBtn" id="mapViewBtn">🗺 Map</button>
      </div>
      <div class="filterRow" id="filterRow"></div>
      <div id="mapWrap" class="hidden"></div>
      <div id="pinnedWrap" class="hidden">
        <div class="subHead">⭐ Pinned</div>
        <div id="pinnedList"></div>
        <div class="subHead">Everything</div>
      </div>
      <div id="timelineList"></div>
      <button class="btnGhost hidden" id="moreBtn">Load more</button>
    </section>

    <!-- REMINDERS -->
    <section id="tab-reminders" class="hidden">
      <h2 class="sect">Reminders</h2>
      <p class="hint">Create one from any memory with “⏰ Remind me”.</p>
      <div id="remindersList"></div>
    </section>

  </main>

  <nav class="tabs">
    <button data-tab="capture" class="active"><span class="ico">➕</span>Capture</button>
    <button data-tab="ask"><span class="ico">🔎</span>Ask</button>
    <button data-tab="timeline"><span class="ico">📅</span>Timeline</button>
    <button data-tab="reminders"><span class="ico">⏰</span>Alerts</button>
  </nav>
</div>

<div id="modalBack" class="hidden">
  <div id="modal">
    <h3>⏰ Remind me</h3>
    <input class="field" id="remTitle" placeholder="Reminder title">
    <input class="field" id="remDue" type="datetime-local" style="color-scheme:dark">
    <button class="btn" id="remSave">Save reminder</button>
    <button class="btnGhost" id="remCancel">Cancel</button>
  </div>
</div>

<div id="toast"></div>
<div id="offlineBadge" class="hidden">📴 Offline — captures will sync later</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://rjcmidmbsjorypyoruea.supabase.co';
const SUPABASE_KEY = 'sb_publishable_6xSiAZTCyM9m7J2JV5Kbdg_gbLeGjE9';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = id => document.getElementById(id);
const toastEl = $('toast');
let toastTimer;
function toast(msg){ toastEl.textContent = msg; toastEl.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 3200); }

if ('serviceWorker' in navigator) { try { navigator.serviceWorker.register('sw.js'); } catch {} }

/* ---------- categories ---------- */
const CATS = {
  parking:'🅿️', food:'🍽️', recommendation:'💡', purchase:'🧾', maintenance:'🔧',
  health:'💊', travel:'✈️', people:'👥', home:'🏠', idea:'💭', other:'📌'
};
const CAT_WORDS = [
  ['parking',['parked','parking','garage','lot ',' lot','level ','row ','spot','space ']],
  ['maintenance',['battery','oil change','tire','filter','replaced','replace','repair','fixed','service','maintenance','furnace','hvac','leak','plumber']],
  ['recommendation',['recommend','suggested','suggest','check out','should try','worth trying','must see']],
  ['food',['restaurant','cafe','café','coffee','ate ','dinner','lunch','brunch','pizza','sushi','taco','ramen','bakery','food']],
  ['purchase',['bought','purchase','receipt','paid','ordered','order ','$','cost','price','warranty','returned']],
  ['health',['doctor','dentist','appointment','prescription','medication','vaccine','dose','allerg','pharmacy','took my']],
  ['travel',['flight','hotel','airbnb','airport','gate ','trip','vacation','passport']],
  ['people',['met ','birthday','anniversary','name is','phone number','moved to']],
  ['home',['wifi','router','paint','model number','serial','thermostat','breaker','garage code','left my','left the']],
  ['idea',['idea','maybe i should','what if','someday','todo']],
];
function autoCat(text){
  const t = ' ' + (text||'').toLowerCase() + ' ';
  for (const [cat, words] of CAT_WORDS)
    if (words.some(w => t.includes(w))) return cat;
  return 'other';
}

/* ---------- auth ---------- */
let signupMode = false;
$('authToggle').onclick = () => {
  signupMode = !signupMode;
  $('authBtn').textContent = signupMode ? 'Create account' : 'Sign in';
  $('authToggle').textContent = signupMode ? 'Have an account? Sign in' : 'New here? Create an account';
  setAuthMsg('');
};
function setAuthMsg(m, cls){ const el=$('authMsg'); el.textContent=m; el.className='authMsg '+(cls||''); }
$('authBtn').onclick = async () => {
  const email = $('email').value.trim(), password = $('password').value;
  if (!email || !password) return setAuthMsg('Enter email and password.', 'err');
  $('authBtn').disabled = true;
  try {
    if (signupMode) {
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      if (!data.session) setAuthMsg('Almost there — check your email and click the confirmation link, then sign in here.', 'ok');
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
    }
  } catch(e){ setAuthMsg(e.message || 'Something went wrong.', 'err'); }
  $('authBtn').disabled = false;
};
$('signOutBtn').onclick = () => sb.auth.signOut();

sb.auth.onAuthStateChange((_ev, session) => {
  const authed = !!session;
  $('authView').classList.toggle('hidden', authed);
  $('appView').classList.toggle('hidden', !authed);
  if (authed) { initCapture(); loadTimeline(true); loadReminders(); loadOnThisDay(); flushQueue(); }
});

/* ---------- offline ---------- */
function updateOnline(){ $('offlineBadge').classList.toggle('hidden', navigator.onLine); }
window.addEventListener('online', () => { updateOnline(); flushQueue(); });
window.addEventListener('offline', updateOnline);
updateOnline();

function getQueue(){ try { return JSON.parse(localStorage.getItem('sm_queue')||'[]'); } catch { return []; } }
function setQueue(q){ localStorage.setItem('sm_queue', JSON.stringify(q)); }
async function flushQueue(){
  const q = getQueue();
  if (!q.length || !navigator.onLine) return;
  let ok = 0;
  for (const row of [...q]) {
    const { error } = await sb.from('memories').insert(row);
    if (error) break;
    q.shift(); ok++;
  }
  setQueue(q);
  if (ok) { toast(`☁️ Synced ${ok} offline ${ok===1?'memory':'memories'}`); loadTimeline(true); }
}

/* ---------- tabs ---------- */
document.querySelectorAll('nav.tabs button').forEach(b => b.onclick = () => {
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.toggle('active', x===b));
  ['capture','ask','timeline','reminders'].forEach(t =>
    $('tab-'+t).classList.toggle('hidden', t !== b.dataset.tab));
  if (b.dataset.tab==='timeline') loadTimeline(true);
  if (b.dataset.tab==='reminders') loadReminders();
  if (b.dataset.tab==='ask') { renderAskChips(); $('searchInput').focus(); }
});

/* ---------- capture ---------- */
let loc = null, photoFile = null, memKind = 'note', capInited = false;
function initCapture(){
  if (capInited) return; capInited = true;
  buildCatChips();
  getLocation();
  const p = new URLSearchParams(location.search);
  const shared = [p.get('share_title'), p.get('share_text'), p.get('share_url')].filter(Boolean).join('\n');
  if (shared) { $('memText').value = shared; paintCatChips(); toast('Shared content added — tap Save'); }
}
function getLocation(){
  if (!navigator.geolocation){ $('locChip').textContent='📍 unavailable'; return; }
  navigator.geolocation.getCurrentPosition(async pos => {
    loc = { lat: pos.coords.latitude, lng: pos.coords.longitude, label: null };
    $('locChip').textContent = '📍 located';
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${loc.lat}&lon=${loc.lng}&zoom=16`);
      const j = await r.json();
      const a = j.address || {};
      loc.label = [a.amenity || a.shop || a.building, a.road, a.neighbourhood || a.suburb, a.city || a.town || a.village]
        .filter(Boolean).slice(0,3).join(', ') || j.name || null;
      if (loc.label) $('locChip').textContent = '📍 ' + loc.label.slice(0, 34);
    } catch {}
  }, () => { $('locChip').textContent='📍 off'; loc=null; }, { enableHighAccuracy:false, timeout:8000, maximumAge:120000 });
}
$('locChip').onclick = () => {
  const on = $('locChip').classList.toggle('on');
  if (!on){ $('locChip').textContent='📍 off'; loc=null; }
  else { $('locChip').textContent='📍 locating…'; getLocation(); }
};
$('whenChip').onclick = () => {
  const w = $('whenWrap'); const show = w.classList.toggle('hidden');
  $('whenChip').classList.toggle('on', !show);
  if (!show && !$('whenInput').value){
    const d = new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset());
    $('whenInput').value = d.toISOString().slice(0,16);
  }
};

/* quick taps */
document.querySelectorAll('.quickBtn').forEach(b => b.onclick = async () => {
  const kind = b.dataset.quick;
  if (kind === 'park') {
    const label = loc?.label ? ' — ' + loc.label : '';
    await saveMemory({ content: 'Parked here' + label, category: 'parking' });
    return;
  }
  const presets = {
    left: { text: 'I left  at ', cat: 'home', caret: 7 },
    meds: { text: 'Took medication', cat: 'health', caret: 15 },

function compressImage(file){
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const max = 1600, s = Math.min(1, max/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      c.toBlob(b => res(b || file), 'image/jpeg', .85);
    };
    img.onerror = () => res(file);
    img.src = URL.createObjectURL(file);
  });
}

/* OCR: read text out of photos in the background so they become searchable */
let ocrLib = null;
async function runOcr(blob, memId){
  try {
    if (!ocrLib) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js';
        s.onload = res; s.onerror = rej; document.head.appendChild(s);
      });
      ocrLib = window.Tesseract;
    }
    const { data } = await ocrLib.recognize(blob, 'eng');
    const text = (data.text || '').trim().slice(0, 15000);
    if (text.length > 3) {
      await sb.from('memories').update({ ocr_text: text }).eq('id', memId);
      toast('📖 Photo text saved — it’s searchable now');
    }
  } catch {}
}

/* save */
async function saveMemory(quick){
  const text = quick ? quick.content : $('memText').value.trim();
  if (!text && !photoFile) return toast('Write, speak, or add a photo first');
  const btn = $('saveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
  try {
    const row = {
      kind: (photoFile && !quick) ? 'photo' : memKind,
      content: text || null,
      photo_path: null,
      category: quick ? quick.category : (chosenCat || autoCat(text)),
      lat: loc?.lat ?? null, lng: loc?.lng ?? null, place_label: loc?.label ?? null,
    };
    if (quick) row.kind = 'note';
    if (!quick && !$('whenWrap').classList.contains('hidden') && $('whenInput').value)
      row.happened_at = new Date($('whenInput').value).toISOString();

    if (!navigator.onLine && !photoFile) {
      const q = getQueue(); q.push(row); setQueue(q);
      if (!quick) resetCapture();
      toast('📴 Saved offline — will sync automatically');
      return;
    }
    const { data: { user } } = await sb.auth.getUser();
    let blobForOcr = null;
    if (photoFile && !quick){
      row.photo_path = `${user.id}/${Date.now()}.jpg`;
      blobForOcr = photoFile;
      const { error: upErr } = await sb.storage.from('photos').upload(row.photo_path, photoFile, { contentType:'image/jpeg' });
      if (upErr) throw upErr;
    }
    const { data: inserted, error } = await sb.from('memories').insert(row).select('id').single();
    if (error) throw error;
    if (!quick) resetCapture();
    toast(quick ? '🅿️ Parking spot remembered' : '✅ Remembered');
    if (blobForOcr && inserted?.id) runOcr(blobForOcr, inserted.id);
  } catch(e){
    if (!navigator.onLine || (e.message||'').includes('Failed to fetch')) {
      const q = getQueue();
      q.push({ content: text || null, category: quick ? quick.category : (chosenCat || autoCat(text)),
               lat: loc?.lat ?? null, lng: loc?.lng ?? null, place_label: loc?.label ?? null });
      setQueue(q);
      if (!quick) resetCapture();
      toast('📴 Saved offline — will sync automatically');
    } else toast('Could not save: ' + (e.message||e));
  } finally {
    btn.disabled = false; btn.textContent = 'Save memory';
  }
}
function resetCapture(){
  $('memText').value=''; photoFile=null; $('photoPreview').classList.add('hidden'); $('photoInput').value='';
  chosenCat=null; memKind='note'; paintCatChips();
  $('whenWrap').classList.add('hidden'); $('whenChip').classList.remove('on'); $('whenInput').value='';
}

/* ---------- date parsing for search ---------- */
const MONTHS = ['january','february','march','april','may','june','july','august','september','october','november','december'];
function parseDates(q){
  let s = q.toLowerCase(), from=null, to=null, note=null;
  const now = new Date();
  const day = d => { const x=new Date(d); x.setHours(0,0,0,0); return x; };
  const endDay = d => { const x=new Date(d); x.setHours(23,59,59,999); return x; };
  function take(re){ const m = s.match(re); if (m) s = s.replace(re,' '); return m; }
  let m;
  if (take(/\btoday\b/)) { from=day(now); to=endDay(now); note='today'; }
  else if (take(/\byesterday\b/)) { const d=new Date(now); d.setDate(d.getDate()-1); from=day(d); to=endDay(d); note='yesterday'; }
  else if (take(/\blast\s+week\b/)) { const d=new Date(now); d.setDate(d.getDate()-d.getDay()-7); from=day(d); const e=new Date(d); e.setDate(e.getDate()+6); to=endDay(e); note='last week'; }
  else if (take(/\bthis\s+week\b/)) { const d=new Date(now); d.setDate(d.getDate()-d.getDay()); from=day(d); to=endDay(now); note='this week'; }
  else if (take(/\blast\s+month\b/)) { const d=new Date(now.getFullYear(), now.getMonth()-1, 1); from=d; to=new Date(now.getFullYear(), now.getMonth(), 0, 23,59,59); note='last month'; }
  else if (take(/\bthis\s+month\b/)) { from=new Date(now.getFullYear(), now.getMonth(), 1); to=endDay(now); note='this month'; }
  else if (take(/\blast\s+year\b/)) { from=new Date(now.getFullYear()-1,0,1); to=new Date(now.getFullYear()-1,11,31,23,59,59); note='last year'; }
  else if (m = take(/\b(\d+)\s+days?\s+ago\b/)) { const d=new Date(now); d.setDate(d.getDate()-(+m[1])); from=day(d); to=endDay(d); note=m[1]+' days ago'; }
  else if (m = take(/\b(\d+)\s+weeks?\s+ago\b/)) { const d=new Date(now); d.setDate(d.getDate()-7*(+m[1])); from=day(new Date(d.getTime()-3*864e5)); to=endDay(new Date(d.getTime()+3*864e5)); note='about '+m[1]+' weeks ago'; }
  else if (m = take(/\b(\d+)\s+months?\s+ago\b/)) { const d=new Date(now.getFullYear(), now.getMonth()-(+m[1]), 1); from=d; to=new Date(d.getFullYear(), d.getMonth()+1, 0,23,59,59); note=m[1]+' months ago'; }
  else {
    for (let i=0;i<12;i++){
      const re = new RegExp('\\b(?:in\\s+)?'+MONTHS[i]+'\\b');
      if (re.test(s)){
        s = s.replace(re,' ');
        let y = now.getFullYear();
        const ym = s.match(/\b(20\d\d)\b/); if (ym){ y=+ym[1]; s=s.replace(ym[0],' '); }
        else if (i > now.getMonth()) y--;
        from = new Date(y,i,1); to = new Date(y,i+1,0,23,59,59); note = MONTHS[i][0].toUpperCase()+MONTHS[i].slice(1)+' '+y;
        break;
      }
    }
  }
  s = s.replace(/\b(where|what|whats|what's|when|who|did|do|does|i|my|the|a|an|at|in|on|was|is|were|that|to|me)\b/g,' ')
       .replace(/[?!.]/g,' ').replace(/\s+/g,' ').trim();
  return { cleaned: s, from, to, note };
}

const SAMPLES = ['Where did I park?','restaurant recommended','wifi password','car battery','parking last month'];
function getRecents(){ try { return JSON.parse(localStorage.getItem('sm_recent')||'[]'); } catch { return []; } }

async function loadTimeline(reset){
  buildFilterRow();

  let qy = sb.from('memories').select('*').order('happened_at', { ascending:false });
  if (tlCat) qy = qy.eq('category', tlCat);
  const { data, error } = await qy.range(tlOffset, tlOffset+PAGE_SIZE-1);
  if (error){ toast(error.message); return; }

    $('timelineList').innerHTML = '<p class="empty">Nothing here yet.<br>Capture your first memory in the ➕ tab.</p>';
    $('moreBtn').classList.add('hidden'); return;
  }

/* ---------- map view ---------- */
let leafletReady = null, map = null, markerLayer = null;
function ensureLeaflet(){
  if (leafletReady) return leafletReady;
  leafletReady = new Promise((res, rej) => {
    const css = document.createElement('link');
    css.rel='stylesheet'; css.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(css);
    const s = document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    s.onload=res; s.onerror=rej; document.head.appendChild(s);
  });
  return leafletReady;
}
async function renderMap(){
  try { await ensureLeaflet(); } catch { return toast('Map could not load'); }
  let qy = sb.from('memories').select('id,content,category,lat,lng,happened_at,place_label')
    .not('lat','is',null).order('happened_at',{ascending:false}).limit(500);
  if (tlCat) qy = qy.eq('category', tlCat);
  const { data } = await qy;
  if (!map){
    map = L.map('mapWrap', { zoomControl: true });
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
      { attribution:'© OpenStreetMap', maxZoom: 19 }).addTo(map);
    markerLayer = L.layerGroup().addTo(map);
  }
  markerLayer.clearLayers();
  if (!data?.length){ map.setView([39.5, -98.35], 4); toast('No located memories yet'); return; }
  const pts = [];
  for (const m of data){
    pts.push([m.lat, m.lng]);
    const mk = L.marker([m.lat, m.lng]).addTo(markerLayer);
    const when = new Date(m.happened_at).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
    const div = document.createElement('div');
    div.style.cssText='max-width:200px;font-size:13px';
    div.textContent = (CATS[m.category]||'📌')+' '+((m.content||m.place_label||'memory').slice(0,90));
    const small = document.createElement('div');
    small.style.cssText='color:#666;margin-top:4px'; small.textContent = when;
    div.appendChild(small);
    mk.bindPopup(div);
  }
  map.fitBounds(pts, { padding:[30,30], maxZoom: 15 });
  setTimeout(() => map.invalidateSize(), 100);
}

/* ---------- memory card ---------- */
const urlCache = new Map();
async function signedUrl(path){
  if (urlCache.has(path)) return urlCache.get(path);
  const { data } = await sb.storage.from('photos').createSignedUrl(path, 3600);
  if (data?.signedUrl) urlCache.set(path, data.signedUrl);
  return data?.signedUrl;
}
function card(m){
  const el = document.createElement('div'); el.className='card' + (m.pinned?' pinnedCard':''); el.dataset.id=m.id;
  const when = new Date(m.happened_at).toLocaleString(undefined,{ month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
  el.innerHTML = `
    ${m.content ? `<div class="content"></div>` : ''}
    ${m.photo_path ? `<img class="mem" alt="memory photo">` : ''}
    ${m.ocr_text ? `<div class="ocr"></div>` : ''}
    <div class="meta">
      <span class="catTag">${CATS[m.category]||'📌'} ${m.category}</span>
      <span>${when}</span>
      ${m.place_label ? `<span>📍 ${escapeHtml(m.place_label)}</span>` :
        (m.lat!=null ? `<span>📍 <a style="color:var(--accent2)" target="_blank" href="https://maps.google.com/?q=${m.lat},${m.lng}">map</a></span>` : '')}
      ${m.kind==='voice' ? '<span>🎤</span>' : ''}
    </div>
    <div class="cardActions">
      <button class="actPin ${m.pinned?'pinned':''}">${m.pinned?'★ Unpin':'⭐ Pin'}</button>
      <button class="actRemind">⏰ Remind me</button>
      ${m.lat!=null ? `<button class="actMap">🗺 Map</button>` : ''}
      <button class="actDel">🗑 Delete</button>
    </div>`;
  if (m.content) el.querySelector('.content').textContent = m.content;
  if (m.ocr_text) el.querySelector('.ocr').textContent = '📖 ' + m.ocr_text.slice(0, 200);
  if (m.photo_path) signedUrl(m.photo_path).then(u => { if(u) el.querySelector('img.mem').src=u; });
  el.querySelector('.actPin').onclick = async (ev) => {
    const newVal = !m.pinned;
    const { error } = await sb.from('memories').update({ pinned: newVal }).eq('id', m.id);
    if (error) return toast(error.message);
    m.pinned = newVal;
    ev.target.textContent = newVal ? '★ Unpin' : '⭐ Pin';
    ev.target.classList.toggle('pinned', newVal);
    el.classList.toggle('pinnedCard', newVal);
    toast(newVal ? '⭐ Pinned' : 'Unpinned');
    loadPinned();
  };
  el.querySelector('.actRemind').onclick = () => openReminderModal(m);
  const mapBtn = el.querySelector('.actMap');
  if (mapBtn) mapBtn.onclick = () => window.open(`https://maps.google.com/?q=${m.lat},${m.lng}`,'_blank');
  el.querySelector('.actDel').onclick = async () => {
    el.style.opacity=.4;
    const { error } = await sb.from('memories').delete().eq('id', m.id);
    if (error){ el.style.opacity=1; return toast(error.message); }
    if (m.photo_path) sb.storage.from('photos').remove([m.photo_path]);
    el.remove(); toast('Deleted');
  };
  return el;
}

  const { data, error } = await sb.from('reminders').select('*').order('due_at');
  if (error) return;
  const box = $('remindersList'); box.innerHTML='';
  if (!data.length){ box.innerHTML = '<p class="empty">No reminders yet.</p>'; return; }
  const now = new Date();
  for (const r of data){
    const el = document.createElement('div');
    const overdue = !r.done && new Date(r.due_at) < now;
    el.className = 'card rem' + (r.done?' done':'') + (overdue?' overdue':'');
    el.innerHTML = `
      <input type="checkbox" ${r.done?'checked':''}>
      <div><div class="rTitle"></div>
      <div class="rDue">${overdue?'⚠️ ':''}${new Date(r.due_at).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}</div></div>
      <button class="rDel">🗑</button>`;
    el.querySelector('.rTitle').textContent = r.title;
    el.querySelector('input').onchange = async e => {
      await sb.from('reminders').update({ done: e.target.checked }).eq('id', r.id); loadReminders(); };
    el.querySelector('.rDel').onclick = async () => {
      await sb.from('reminders').delete().eq('id', r.id); el.remove(); };
    box.appendChild(el);
  }
}

/* ---------- export ---------- */
$('exportBtn').onclick = async () => {
  toast('Preparing your export…');
  const [mem, rem] = await Promise.all([
    sb.from('memories').select('*').order('happened_at'),
    sb.from('reminders').select('*').order('due_at'),
  ]);
  const blob = new Blob([JSON.stringify({
    exported_at: new Date().toISOString(),
    memories: mem.data || [], reminders: rem.data || [],
  }, null, 2)], { type:'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'secondmind-export.json';
  a.click();
  toast('⬇ Export downloaded — your data is yours');
};
</script>
</body>
</html>
